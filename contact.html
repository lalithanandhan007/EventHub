<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventX - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <div class="logo">EventX</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Page Header -->
  <section class="page-header" style="background:linear-gradient(135deg,#d4fc79,#96e6a1);">
    <h1>Contact Us</h1>
    <p>We’d love to hear from you!</p>
  </section>

  <!-- Contact Form -->
  <div class="form-container">
    <h2>Get in Touch</h2>
    <form>
      <label>Your Name</label>
      <input type="text" placeholder="Enter your name">

      <label>Your Email</label>
      <input type="email" placeholder="Enter your email">

      <label>Message</label>
      <textarea rows="4" placeholder="Type your message..."></textarea>

      <button type="submit">Send</button>
    </form>
  </div>

  <footer>
    <p>© 2025 EventX | Designed by You</p>
  </footer>
  <script src="script.js"></script>

</body>
</html>
